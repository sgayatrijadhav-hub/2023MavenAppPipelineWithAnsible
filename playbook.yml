- hosts: all
  become: yes

  tasks:
    - name: Copy WAR file
      copy:
        src: target/2023MavenAppPipelineWithAnsible.war
        dest: /opt/tomcat/apache-tomcat-10.1.54/webapps/

    - name: Restart Tomcat
      shell: |
        /opt/tomcat/apache-tomcat-10.1.54/bin/shutdown.sh
        /opt/tomcat/apache-tomcat-10.1.54/bin/startup.sh
